version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sociedad_rural_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TZ=America/Argentina/Buenos_Aires

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pasa estas variables de entorno durante el build del contenedor de frontend
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    container_name: sociedad_rural_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
